# TEMPORARY — remove once sender-key fixes are merged into upstream AsamK/signal-cli
# Tracks: https://github.com/AsamK/signal-cli/pull/2019
#         https://github.com/AsamK/signal-cli/pull/2020
#
# Builds the Docker image using the patched signal-cli from smeinecke/signal-cli master.

name: Docker (patched signal-cli)

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-signal-cli:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      download_url: ${{ steps.release.outputs.download_url }}
      signal_cli_version: ${{ steps.version.outputs.version }}
    steps:
      - name: Get latest signal-cli CI run from fork
        id: run
        run: |
          run_id="$(gh api repos/smeinecke/signal-cli/actions/workflows/ci.yml/runs \
            --jq '[.workflow_runs[] | select(.head_branch=="master" and .conclusion=="success")] | first | .id')"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Download signal-cli artifact
        run: |
          gh run download "${{ steps.run.outputs.run_id }}" \
            --repo smeinecke/signal-cli \
            --name signal-cli-archive-25 \
            --dir /tmp/signal-cli-patched

      - name: Get signal-cli version from archive
        id: version
        run: |
          version="$(tar -tzf /tmp/signal-cli-patched/signal-cli-*.tar.gz | head -1 | sed 's|signal-cli-\([^/]*\)/.*|\1|')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create pre-release to host the artifact
        id: release
        run: |
          tag="signal-cli-patched-$(date +%Y%m%d%H%M%S)"
          filename="signal-cli-${{ steps.version.outputs.version }}.tar.gz"

          gh release create "$tag" \
            --repo "${{ github.repository }}" \
            --title "Patched signal-cli ${{ steps.version.outputs.version }} (temporary)" \
            --notes "Temporary build with sender-key fixes from smeinecke/signal-cli. Auto-delete after upstream merges PRs #2019 and #2020." \
            --prerelease \
            /tmp/signal-cli-patched/${filename}

          url="https://github.com/${{ github.repository }}/releases/download/${tag}/${filename}"
          echo "download_url=$url" >> "$GITHUB_OUTPUT"

  build-docker-images:
    needs: build-signal-cli
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          # - platform: linux/arm/v7
          #   runner: ubuntu-latest
          # - platform: linux/arm64/v8
          #   runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Downcase repo
        run: echo REPOSITORY=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]') >> $GITHUB_ENV

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v5.8.0
        with:
          images: ghcr.io/${{ env.REPOSITORY }}
          tags: |
            type=raw,value=signal-cli-patched
          flavor: latest=false

      - name: Set up QEMU
        if: ${{ matrix.runner == 'ubuntu-latest' }}
        uses: docker/setup-qemu-action@v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            SIGNAL_CLI_DOWNLOAD_URL=${{ needs.build-signal-cli.outputs.download_url }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ env.REPOSITORY }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [build-signal-cli, build-docker-images]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Downcase repo
        run: echo REPOSITORY=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]') >> $GITHUB_ENV

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v5.8.0
        with:
          images: ghcr.io/${{ env.REPOSITORY }}
          tags: |
            type=raw,value=signal-cli-patched
          flavor: latest=false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Create and push manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ env.REPOSITORY }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ env.REPOSITORY }}:signal-cli-patched
