name: Check upstream signal-cli release

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Resolve latest upstream signal-cli version
        id: upstream
        run: |
          version="$(gh api repos/AsamK/signal-cli/releases/latest --jq '.tag_name | sub("^v"; "")')"
          if [ -z "$version" ]; then
            echo "Failed to resolve upstream signal-cli release" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check if already synced
        id: synced
        run: |
          tag="signal-cli-v${{ steps.upstream.outputs.version }}"
          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Docker release workflow
        if: steps.synced.outputs.exists == 'false'
        run: |
          gh workflow run release-docker.yml \
            --ref "${{ github.event.repository.default_branch }}" \
            --field create_sync_release=true

      - name: Summary
        run: |
          echo "Upstream signal-cli: ${{ steps.upstream.outputs.version }}"
          echo "Already synced: ${{ steps.synced.outputs.exists }}"
