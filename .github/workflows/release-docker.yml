name: Docker release

on:
  push:
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering
    inputs:
      create_sync_release:
        description: "Create a GitHub release for automated upstream signal-cli sync"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve-signal-cli:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      signal_cli_version: ${{ steps.resolve.outputs.signal_cli_version }}
    steps:
      - name: Resolve latest signal-cli release
        id: resolve
        run: |
          version="$(gh api repos/AsamK/signal-cli/releases/latest --jq '.tag_name | sub("^v"; "")')"
          if [ -z "$version" ]; then
            echo "Failed to resolve upstream signal-cli release" >&2
            exit 1
          fi
          echo "signal_cli_version=$version" >> "$GITHUB_OUTPUT"

  build-docker-images:
    if: ${{ !github.event.pull_request.head.repo.fork }}
    needs: resolve-signal-cli
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    env:
      SIGNAL_CLI_VERSION: ${{ needs.resolve-signal-cli.outputs.signal_cli_version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm/v7
            runner: ubuntu-latest
          - platform: linux/arm64/v8
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Downcase repo
        run: echo REPOSITORY=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]') >> $GITHUB_ENV

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v5.8.0
        with:
          images: |
            ghcr.io/${{ env.REPOSITORY }}
          tags: |
            type=semver,pattern={{version}},prefix=v
            type=raw,value=latest,enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=signal-cli-${{ env.SIGNAL_CLI_VERSION }},enable=${{ github.event_name != 'pull_request' }}
            type=ref,event=pr
          flavor: |
            latest=false

      - name: Set up QEMU
        if: ${{ matrix.runner == 'ubuntu-latest' }}
        uses: docker/setup-qemu-action@v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            SIGNAL_CLI_VERSION=${{ env.SIGNAL_CLI_VERSION }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ env.REPOSITORY }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    permissions:
      contents: read
      packages: write
    if: ${{ !github.event.pull_request.head.repo.fork && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs:
      - resolve-signal-cli
      - build-docker-images
    env:
      SIGNAL_CLI_VERSION: ${{ needs.resolve-signal-cli.outputs.signal_cli_version }}
    steps:
      - name: Downcase repo
        run: echo REPOSITORY=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]') >> $GITHUB_ENV

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v5.8.0
        with:
          images: |
            ghcr.io/${{ env.REPOSITORY }}
          tags: |
            type=semver,pattern={{version}},prefix=v
            type=raw,value=latest
            type=raw,value=signal-cli-${{ env.SIGNAL_CLI_VERSION }}
          flavor: |
            latest=false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Create and push manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ env.REPOSITORY }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ env.REPOSITORY }}:latest

  create-sync-release:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.create_sync_release == true }}
    needs:
      - resolve-signal-cli
      - merge
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      SIGNAL_CLI_VERSION: ${{ needs.resolve-signal-cli.outputs.signal_cli_version }}
    steps:
      - name: Create GitHub release for synced signal-cli version
        run: |
          set -euo pipefail
          tag="signal-cli-v${SIGNAL_CLI_VERSION}"
          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $tag already exists, skipping"
            exit 0
          fi

          gh release create "$tag" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "signal-cli ${SIGNAL_CLI_VERSION} sync" \
            --notes "Automated release after syncing to upstream AsamK/signal-cli v${SIGNAL_CLI_VERSION}."
